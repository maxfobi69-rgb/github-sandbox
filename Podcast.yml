- name: Commit & Push in batches of 5 files
  run: |
    BRANCH="${GITHUB_REF_NAME}"
    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    # جمع‌آوری نام فایل‌های جدید/تغییریافته با جداکننده null
    mapfile -d '' ALL_FILES < <(git -c core.quotepath=false ls-files -z --others --modified --exclude-standard downloads/)
    TOTAL=${#ALL_FILES[@]}
    echo "📦 Total files to push: $TOTAL"

    if [ "$TOTAL" -eq 0 ]; then
      echo "Nothing to commit"
      exit 0
    fi

    BATCH_SIZE=5
    BATCH_NUM=0

    for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
      BATCH_NUM=$(( BATCH_NUM + 1 ))
      # استخراج دستهٔ ۵ تایی
      BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
      echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

      # اضافه کردن تک‌تک فایل‌های دسته با git add
      for file in "${BATCH[@]}"; do
        git add "$file"
      done

      git commit -m "Add downloaded files — batch $BATCH_NUM [skip ci]"

      # کشیدن تغییرات احتمالی و push
      git pull --rebase origin "$BRANCH"
      git push origin HEAD:"$BRANCH"

      echo "✅ Batch $BATCH_NUM pushed"
    done

    echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
