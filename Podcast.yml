name: Download File (Safe ASCII)

on:
  push:
    branches:
      - "**"

jobs:
  download-and-save:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: sudo apt-get update -y && sudo apt-get install -y aria2

      - name: Download files based on commit message
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download:'; then
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download: command found"
            exit 1
          fi

          mkdir -p downloads

          for URL in $URL_LINE; do
            # ساخت یک نام فایل کاملاً امن (فقط حروف انگلیسی، اعداد، نقطه و خط تیره)
            ORIGINAL_NAME=$(basename "$URL")
            # حذف کاراکترهای غیرمجاز (همه چیز بجز a-z A-Z 0-9 . - _) و تبدیل آنها به زیرخط
            SAFE_NAME=$(echo "$ORIGINAL_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            # اگر بعد از پالایش نام خالی ماند، یک نام تصادفی بده
            if [ -z "$SAFE_NAME" ]; then
              SAFE_NAME="download_$(date +%s)"
            fi

            echo "⬇️ Downloading $URL → $SAFE_NAME"
            aria2c \
              --dir=downloads \
              --out="$SAFE_NAME" \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              "$URL"
          done

      - name: Commit and push files (no ls-files, safe names)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # اضافه کردن همه فایل‌های پوشه downloads
          git add downloads/

          # تلاش برای commit؛ اگر چیزی برای commit نبود خطا نمی‌دهد
          git commit -m "Add downloaded file(s)" || echo "Nothing to commit"

          # pull و push
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}"
