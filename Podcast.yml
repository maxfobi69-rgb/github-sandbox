- name: Commit & Push files (safe UTF-8)
  run: |
    BRANCH="${GITHUB_REF_NAME}"
    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    # فقط فایل‌های موجود در downloads/ را اضافه کن (بدون git ls-files)
    git add downloads/
    git commit -m "Add downloaded files" || echo "Nothing to commit"
    git pull --rebase origin "$BRANCH" || true
    git push origin HEAD:"$BRANCH"

    # تولید لیست فایل‌ها با جداکننده null (امن برای هر کاراکتری)
    git -c core.quotepath=false ls-files -z --others --modified --exclude-standard downloads/ > /tmp/files.txt

    # شمارش فایل‌ها (تعداد null ها = تعداد فایل)
    TOTAL=$(tr -cd '\0' < /tmp/files.txt | wc -c)
    echo "📦 Total files to push: $TOTAL"

    if [ "$TOTAL" -eq 0 ]; then
      echo "Nothing to commit"
      exit 0
    fi

    BATCH_SIZE=5
    count=0
    batch_num=0
    batch_files=()

    # خواندن null-delimited و افزودن تدریجی
    while IFS= read -r -d '' file; do
      batch_files+=("$file")
      count=$((count + 1))
      # وقتی به سایز دسته رسیدیم یا فایل آخر را خواندیم
      if [ $((count % BATCH_SIZE)) -eq 0 ] || [ "$count" -eq "$TOTAL" ]; then
        batch_num=$((batch_num + 1))
        echo "🚀 Pushing batch $batch_num: file(s) $((count - ${#batch_files[@]} + 1))–$count of $TOTAL"

        # اضافه کردن دقیق همین فایل‌ها
        for f in "${batch_files[@]}"; do
          git add "$f"
        done

        git commit -m "Add downloaded files — batch $batch_num [skip ci]" || echo "No changes to commit"
        git pull --rebase origin "$BRANCH" || true
        git push origin HEAD:"$BRANCH"

        batch_files=()   # پاک‌سازی برای دستهٔ بعدی
      fi
    done < /tmp/files.txt

    echo "🎉 All $TOTAL files pushed in $batch_num batch(es)"
