name: Download Podcast (Safe)

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: sudo apt-get update -y && sudo apt-get install -y aria2

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download:'; then
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download: command found"
            exit 1
          fi

          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            ORIGINAL_NAME=$(basename "$URL")
            # تبدیل نام فایل به حروف لاتین، اعداد، نقطه و خط تیره (بقیه تبدیل به _)
            SAFE_NAME=$(echo "$ORIGINAL_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            if [ -z "$SAFE_NAME" ]; then
              SAFE_NAME="file_$(date +%s)"
            fi
            echo "⬇️ Downloading $URL → $SAFE_NAME"

            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --dir="tmp_downloads" \
              --out="$SAFE_NAME" \
              "$URL"
          done

          # انتقال فایل‌ها به پوشه downloads
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit and push (safe, no ls-files)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # فقط پوشه downloads را اضافه می‌کنیم (بدون هیچ ls-files)
          git add downloads/

          git commit -m "Add downloaded files" || echo "Nothing to commit"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
